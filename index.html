<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevParis Radar</title>
  </head>

  <body>
    <header class="site-header">
      <p class="site-header__tagline">
        OpenData Paris · Innovation · Coworking</p>
      <h1>DevParis Radar</h1>
      <p class="site-header__description">
        Trouve des lieux d’innovation, de coworking et de réseau tech à Paris.
      </p>
    </header>

    <main>

      <section class="controls">
  <div class="controls__field">
    <label for="search-input">Rechercher un lieu</label>
    <input
      id="search-input"
      type="text"
      placeholder="Exemple : Montreuil, Paris 19e, innovation..."
    />
  </div>

  <div class="controls__field">
    <label for="commune-select">Filtrer par commune</label>
    <select id="commune-select">
      <option value="Toutes">Toutes les communes</option>
    </select>
  </div>

  <div class="controls__field">
  <label for="etat-select">Filtrer par état</label>
  <select id="etat-select">
    <option value="Tous">Tous les états</option>
  </select>
</div>

  </section>
  
<section class="results-header">
  <div>
    <h2>Lieux trouvés</h2>
    <p>
      Nombre de lieux affichés :
      <span id="counter">0</span>
    </p>
  </div>
</section>

  <section id="places-container">
  </section>
  </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
